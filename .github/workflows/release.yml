name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate current version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # Version format per package: X.Y.Z, X.Y.Z-pre.N, or X.Y.Z-exp.N.
          # All packages must share the same X.Y.Z (SemVer core).
          # Versions are bumped by the Prepare Release workflow; this workflow
          # only tags and publishes whatever is currently on beta, so the tested
          # commit and the released commit are guaranteed identical.
          VRE='^([0-9]+)\.([0-9]+)\.([0-9]+)(-(pre|exp)\.([0-9]+))?$'
          FIRST_PKG=$(ls Packages | head -1)
          FIRST_V=$(jq -r .version "Packages/$FIRST_PKG/package.json")
          [[ "$FIRST_V" =~ $VRE ]] || { echo "Invalid version: Packages/$FIRST_PKG = $FIRST_V" >&2; exit 1; }
          SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          for pkg in Packages/*/package.json; do
            V=$(jq -r .version "$pkg")
            [[ "$V" =~ $VRE ]] || { echo "Invalid version: $pkg = $V" >&2; exit 1; }
            PKG_SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            if [[ "$PKG_SEMVER" != "$SEMVER" ]]; then
              echo "SemVer mismatch: $pkg = $PKG_SEMVER, expected $SEMVER" >&2
              exit 1
            fi
          done
          echo "version=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "tag=v$SEMVER"   >> "$GITHUB_OUTPUT"
          echo "Releasing v$SEMVER from current beta HEAD"

      - name: Fail if tag already exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.ver.outputs.tag }} already exists. Run Prepare Release first to bump the version." >&2
            exit 1
          fi

      - name: Fast-forward main to beta
        shell: bash
        run: |
          set -euo pipefail
          # beta always contains main as ancestor, so this is a fast-forward push
          git push origin beta:main

      - name: Create tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "LiveStudio ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --target main
