name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump (applies to all packages)"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          # Version format per package: X.Y.Z, X.Y.Z-pre.N, or X.Y.Z-exp.N.
          # All packages must share the same X.Y.Z (SemVer core); the -pre/-exp
          # stage is per-package and is preserved across releases.
          VRE='^([0-9]+)\.([0-9]+)\.([0-9]+)(-(pre|exp)\.([0-9]+))?$'
          FIRST_PKG=$(ls Packages | head -1)
          FIRST_V=$(jq -r .version "Packages/$FIRST_PKG/package.json")
          [[ "$FIRST_V" =~ $VRE ]] || { echo "Invalid version: Packages/$FIRST_PKG = $FIRST_V" >&2; exit 1; }
          CUR_SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          MA="${BASH_REMATCH[1]}"; MI="${BASH_REMATCH[2]}"; PA="${BASH_REMATCH[3]}"
          for pkg in Packages/*/package.json; do
            V=$(jq -r .version "$pkg")
            [[ "$V" =~ $VRE ]] || { echo "Invalid version: $pkg = $V" >&2; exit 1; }
            PKG_SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            if [[ "$PKG_SEMVER" != "$CUR_SEMVER" ]]; then
              echo "SemVer mismatch: $pkg = $PKG_SEMVER, expected $CUR_SEMVER" >&2
              exit 1
            fi
          done
          case "${{ inputs.version_bump }}" in
            major) NEW_SEMVER="$((MA+1)).0.0" ;;
            minor) NEW_SEMVER="$MA.$((MI+1)).0" ;;
            patch) NEW_SEMVER="$MA.$MI.$((PA+1))" ;;
          esac
          echo "current=$CUR_SEMVER"        >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_SEMVER"    >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_SEMVER"           >> "$GITHUB_OUTPUT"
          echo "Bumping SemVer: $CUR_SEMVER -> $NEW_SEMVER (tag v$NEW_SEMVER); per-package -pre/-exp stage preserved, suffix counter reset to 1"

      - name: Fail if tag already exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/${{ steps.bump.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.bump.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Bump all package.json on beta and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_SEMVER="${{ steps.bump.outputs.new_version }}"
          VRE='^([0-9]+)\.([0-9]+)\.([0-9]+)(-(pre|exp)\.([0-9]+))?$'
          for pkg in Packages/*/package.json; do
            V=$(jq -r .version "$pkg")
            [[ "$V" =~ $VRE ]] || { echo "Invalid version: $pkg = $V" >&2; exit 1; }
            STAGE="${BASH_REMATCH[5]:-}"
            if [[ -n "$STAGE" ]]; then
              NEW="$NEW_SEMVER-$STAGE.1"
            else
              NEW="$NEW_SEMVER"
            fi
            jq ".version = \"$NEW\"" "$pkg" > "$pkg.tmp" && mv "$pkg.tmp" "$pkg"
            git add "$pkg"
          done
          git commit -m "release: v$NEW_SEMVER"
          git push origin beta

      - name: Fast-forward main to beta
        shell: bash
        run: |
          set -euo pipefail
          # beta always contains main as ancestor, so this is a fast-forward push
          git push origin beta:main

      - name: Create tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "LiveStudio ${{ steps.bump.outputs.tag }}" \
            --generate-notes \
            --target main
