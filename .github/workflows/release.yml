name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate current version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # Version format per package: X.Y.Z, X.Y.Z-pre.N, or X.Y.Z-exp.N.
          # All packages must share the same X.Y.Z (SemVer core).
          # Versions are bumped manually via the /sync-version skill before this
          # workflow is dispatched, so the current SemVer determines the tag.
          # The tag itself is created by Beta Release; this workflow only
          # promotes the existing prerelease to stable.
          VRE='^([0-9]+)\.([0-9]+)\.([0-9]+)(-(pre|exp)\.([0-9]+))?$'
          FIRST_PKG=$(ls Packages | head -1)
          FIRST_V=$(jq -r .version "Packages/$FIRST_PKG/package.json")
          [[ "$FIRST_V" =~ $VRE ]] || { echo "Invalid version: Packages/$FIRST_PKG = $FIRST_V" >&2; exit 1; }
          SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          for pkg in Packages/*/package.json; do
            V=$(jq -r .version "$pkg")
            [[ "$V" =~ $VRE ]] || { echo "Invalid version: $pkg = $V" >&2; exit 1; }
            PKG_SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            if [[ "$PKG_SEMVER" != "$SEMVER" ]]; then
              echo "SemVer mismatch: $pkg = $PKG_SEMVER, expected $SEMVER" >&2
              exit 1
            fi
          done
          echo "version=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "tag=v$SEMVER"   >> "$GITHUB_OUTPUT"
          echo "Promoting v$SEMVER from current beta HEAD"

      - name: Verify beta tag and release exist
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Beta Release must have created the tag and a prerelease GitHub
          # Release. Stable Release only promotes; it never creates new tags.
          git fetch --tags
          if ! git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.ver.outputs.tag }} not found. Run Beta Release first." >&2
            exit 1
          fi
          if ! gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub Release ${{ steps.ver.outputs.tag }} not found. Run Beta Release first." >&2
            exit 1
          fi

      - name: Fast-forward main to beta
        shell: bash
        run: |
          set -euo pipefail
          # beta always contains main as ancestor, so this is a fast-forward push
          git push origin beta:main

      - name: Promote GitHub Release to stable
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Tag stays where Beta Release placed it (it is reachable from main
          # via the fast-forward above). Only the GitHub Release metadata
          # is updated: target → main, prerelease flag cleared.
          gh release edit "${{ steps.ver.outputs.tag }}" \
            --prerelease=false \
            --target main
