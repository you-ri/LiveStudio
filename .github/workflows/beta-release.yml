name: Beta Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  beta-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate current version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # Version format per package: X.Y.Z, X.Y.Z-pre.N, or X.Y.Z-exp.N.
          # All packages must share the same X.Y.Z (SemVer core).
          # Versions are bumped manually via the /sync-version skill before this
          # workflow is dispatched. The tag is "v<X.Y.Z>" and is shared with the
          # eventual Release workflow (which promotes the same tag/release from
          # prerelease to stable rather than creating a new one).
          VRE='^([0-9]+)\.([0-9]+)\.([0-9]+)(-(pre|exp)\.([0-9]+))?$'
          FIRST_PKG=$(ls Packages | head -1)
          FIRST_V=$(jq -r .version "Packages/$FIRST_PKG/package.json")
          [[ "$FIRST_V" =~ $VRE ]] || { echo "Invalid version: Packages/$FIRST_PKG = $FIRST_V" >&2; exit 1; }
          SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          for pkg in Packages/*/package.json; do
            V=$(jq -r .version "$pkg")
            [[ "$V" =~ $VRE ]] || { echo "Invalid version: $pkg = $V" >&2; exit 1; }
            PKG_SEMVER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            if [[ "$PKG_SEMVER" != "$SEMVER" ]]; then
              echo "SemVer mismatch: $pkg = $PKG_SEMVER, expected $SEMVER" >&2
              exit 1
            fi
          done
          echo "version=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "tag=v$SEMVER"    >> "$GITHUB_OUTPUT"
          echo "Beta-releasing v$SEMVER from current dev HEAD"

      - name: Fail if tag already exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.ver.outputs.tag }} already exists. Bump the SemVer core via /sync-version first." >&2
            exit 1
          fi

      - name: Fast-forward beta to dev
        shell: bash
        run: |
          set -euo pipefail
          # dev must have beta as ancestor; this is a fast-forward push.
          # If beta has commits dev does not, merge beta back into dev first.
          git push origin dev:beta

      - name: Create tag and GitHub Release (pre-release)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "LiveStudio ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --prerelease \
            --target beta
